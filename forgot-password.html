<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP PDF EDITOR - Password Reset</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ===== RESET & VARIABLES ===== */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        :root {
            --primary: #2563eb; 
            --primary-dark: #1d4ed8; 
            --primary-light: #3b82f6; 
            --primary-soft: #dbeafe;
            --success: #059669; 
            --success-light: #d1fae5; 
            --warning: #d97706; 
            --warning-light: #fef3c7;
            --danger: #dc2626; 
            --danger-light: #fee2e2; 
            --dark: #0f172a; 
            --dark-light: #334155;
            --gray: #64748b; 
            --gray-light: #94a3b8; 
            --gray-soft: #e2e8f2; 
            --gray-bg: #f8fafc;
            --white: #ffffff; 
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.05);
            --shadow-xl: 0 25px 50px -12px rgba(0,0,0,0.15); 
            --radius-lg: 20px; 
            --radius-xl: 30px;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        }

        body {
            font-family: var(--font-sans); 
            background: linear-gradient(145deg, #f1f5f9 0%, #e6edf5 100%); 
            min-height: 100vh; 
        }

        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 0 20px; 
            width: 100%;
        }

        /* Header */
        header { 
            background: rgba(255,255,255,0.75); 
            backdrop-filter: blur(20px); 
            padding: 1rem 0; 
            box-shadow: var(--shadow-lg); 
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-content { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo { 
            font-size: clamp(1.2rem, 4vw, 1.5rem); 
            font-weight: 700; 
            background: linear-gradient(135deg, var(--dark), var(--primary-dark)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo i {
            font-size: clamp(1.4rem, 5vw, 1.8rem);
            color: var(--primary);
            -webkit-text-fill-color: var(--primary);
        }

        /* Stats Cards - Live Statistics */
        .stats-container {
            margin: 2rem 0;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
        }

        .stat-card {
            background: white;
            border-radius: var(--radius-xl);
            padding: 1.5rem 1rem;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s ease;
            border: 1px solid var(--gray-soft);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
        }

        .stat-card.pending::before {
            background: linear-gradient(90deg, var(--warning), #fbbf24);
        }

        .stat-card.approved::before {
            background: linear-gradient(90deg, var(--success), #34d399);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-xl);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            background: var(--primary-soft);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--primary);
        }

        .stat-icon.pending {
            background: var(--warning-light);
            color: var(--warning);
        }

        .stat-icon.approved {
            background: var(--success-light);
            color: var(--success);
        }

        .stat-info {
            flex: 1;
        }

        .stat-value {
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 700;
            color: var(--dark);
            line-height: 1.2;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-label {
            color: var(--gray);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .live-badge {
            background: var(--danger);
            color: white;
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-left: 8px;
        }

        .live-badge i {
            font-size: 0.5rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* Hero Section */
        .hero { 
            padding: 2rem 0 3rem; 
            display: flex; 
            align-items: center; 
            gap: 3rem; 
            flex-wrap: wrap; 
        }
        .hero-content { 
            flex: 1; 
            min-width: 280px; 
        }
        .hero-badge { 
            background: var(--primary-soft); 
            color: var(--primary); 
            padding: 0.5rem 1rem; 
            border-radius: var(--radius-xl); 
            display: inline-block; 
            margin-bottom: 1rem; 
            font-size: 0.9rem;
            font-weight: 600;
        }
        .hero-title { 
            font-size: clamp(1.8rem, 5vw, 3rem); 
            font-weight: 800; 
            line-height: 1.2; 
            margin-bottom: 1rem; 
            background: linear-gradient(135deg, var(--dark), var(--primary-dark)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .hero p {
            color: var(--gray);
            font-size: 1rem;
            max-width: 500px;
        }

        /* Grid */
        .reset-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            margin: 2rem 0;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: var(--radius-xl);
            padding: 2rem;
            box-shadow: var(--shadow-xl);
            height: fit-content;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--dark);
        }
        .card-title i {
            color: var(--primary);
        }

        /* Form */
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--dark);
            font-size: 0.9rem;
        }
        .form-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--gray-soft);
            border-radius: var(--radius-lg);
            font-size: 1rem;
            transition: all 0.3s;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-soft);
        }
        textarea.form-input {
            min-height: 100px;
            resize: vertical;
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 20px 30px -10px var(--primary);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Key Display */
        .key-display {
            background: linear-gradient(135deg, var(--warning), #e67e22);
            color: white;
            padding: 1rem;
            border-radius: var(--radius-lg);
            margin: 1rem 0;
            text-align: center;
            font-family: monospace;
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            letter-spacing: 2px;
            cursor: pointer;
            animation: slideUp 0.5s ease;
        }
        .key-display small {
            font-size: 0.7rem;
            opacity: 0.9;
            display: block;
            margin-top: 5px;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Messages */
        .message-card {
            background: var(--gray-bg);
            border-radius: var(--radius-lg);
            padding: 1.2rem;
            margin-bottom: 1rem;
            border-left: 4px solid var(--primary);
            animation: slideUp 0.3s ease;
            position: relative;
        }
        .message-card.approved {
            border-left-color: var(--success);
            background: linear-gradient(145deg, var(--gray-bg), var(--success-light));
        }
        .message-card.pending {
            border-left-color: var(--warning);
        }
        .message-card.rejected {
            border-left-color: var(--danger);
            background: linear-gradient(145deg, var(--gray-bg), var(--danger-light));
            opacity: 0.9;
        }

        .message-status {
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
        }
        .status-pending {
            background: var(--warning-light);
            color: var(--warning);
        }
        .status-approved {
            background: var(--success-light);
            color: var(--success);
        }
        .status-rejected {
            background: var(--danger-light);
            color: var(--danger);
        }

        .password-box {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
            padding: 1rem;
            border-radius: var(--radius-lg);
            margin-top: 1rem;
            font-family: monospace;
            font-size: 1rem;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            word-break: break-all;
        }
        .password-box:hover {
            transform: scale(1.02);
        }

        /* Action Buttons */
        .request-actions {
            display: flex;
            gap: 10px;
            margin-top: 1rem;
            border-top: 2px solid var(--gray-soft);
            padding-top: 1rem;
        }
        
        .action-btn {
            flex: 1;
            padding: 0.6rem;
            border: none;
            border-radius: var(--radius-lg);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.3s;
        }
        
        .reject-btn {
            background: var(--danger-light);
            color: var(--danger);
        }
        .reject-btn:hover {
            background: var(--danger);
            color: white;
        }
        
        .delete-btn {
            background: var(--gray-soft);
            color: var(--gray);
        }
        .delete-btn:hover {
            background: var(--gray);
            color: white;
        }

        .notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: white;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            border-left: 5px solid var(--success);
            transition: all 0.3s;
            z-index: 1000;
            min-width: 280px;
            max-width: 90%;
            text-align: center;
            font-size: 0.9rem;
        }
        .notification.show {
            transform: translateX(-50%) translateY(0);
        }
        .notification.error {
            border-left-color: var(--danger);
        }
        
        .email-status {
            padding: 0.8rem;
            border-radius: var(--radius-lg);
            margin: 1rem 0;
            font-size: 0.85rem;
            display: none;
            animation: slideUp 0.3s ease;
        }
        .email-exists {
            background: var(--success-light);
            color: var(--success);
            border: 1px solid var(--success);
        }
        .email-not-exists {
            background: var(--danger-light);
            color: var(--danger);
            border: 1px solid var(--danger);
        }
        
        .user-info {
            background: var(--primary-soft);
            padding: 0.8rem 1rem;
            border-radius: var(--radius-lg);
            margin-top: 0.5rem;
            font-size: 0.85rem;
            display: none;
            border: 1px solid var(--primary-light);
        }
        .user-info.show {
            display: block;
        }

        .status-container {
            position: relative;
            min-height: 150px;
        }

        .auto-save-indicator {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: var(--dark);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            display: none;
            align-items: center;
            gap: 8px;
            z-index: 999;
            box-shadow: var(--shadow-lg);
        }
        .auto-save-indicator i {
            color: var(--success);
        }

        .hidden-monitor {
            display: none;
        }

        /* Loading Overlay */
        .loading-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(5px); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 50000; 
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 0.3s ease; 
        }
        .loading-overlay.show { 
            opacity: 1; 
            pointer-events: all; 
        }
        .spinner { 
            width: 50px; 
            height: 50px; 
            border: 4px solid var(--gray-soft); 
            border-top: 4px solid var(--primary); 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }

        /* Mobile & Tablet Responsive */
        @media (max-width: 1024px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
            
            .reset-grid {
                gap: 1.5rem;
            }
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
                gap: 0.8rem;
            }
            
            .reset-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            
            .card {
                padding: 1.5rem;
            }
            
            .hero {
                padding: 1rem 0 2rem;
            }
            
            .stat-card {
                padding: 1rem;
            }
            
            .stat-value {
                font-size: 1.5rem;
            }
            
            .request-actions {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 15px;
            }
            
            .hero-title {
                font-size: 1.8rem;
            }
            
            .card-title {
                font-size: 1.2rem;
            }
            
            .form-input {
                padding: 0.8rem;
            }
            
            .btn-primary {
                padding: 0.8rem;
            }
            
            .stat-icon {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
            
            .key-display {
                font-size: 1rem;
                padding: 0.8rem;
            }
            
            .password-box {
                font-size: 0.9rem;
                padding: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification">
        <span id="notificationMessage"></span>
    </div>

    <!-- Hidden auto-save indicator -->
    <div class="auto-save-indicator" id="autoSaveIndicator">
        <i class="fas fa-sync-alt fa-spin"></i>
        <span>Background check active</span>
    </div>

    <header>
        <div class="container header-content">
            <div class="logo">
                <i class="fas fa-file-pdf"></i> VIP PDF EDITOR
            </div>
            <div class="live-badge" style="background: var(--primary);">
                <i class="fas fa-circle"></i> LIVE SYSTEM
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <!-- Live Statistics Section -->
            <div class="stats-container">
                <div class="stats-grid" id="liveStats">
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value" id="pendingStat">0</div>
                            <div class="stat-label">Pending Requests</div>
                        </div>
                    </div>
                    
                    <div class="stat-card approved">
                        <div class="stat-icon approved">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value" id="approvedStat">0</div>
                            <div class="stat-label">Approved</div>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon pending">
                            <i class="fas fa-hourglass-half"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value" id="processingStat">
                                0
                                <span class="live-badge">
                                    <i class="fas fa-circle"></i> LIVE
                                </span>
                            </div>
                            <div class="stat-label">Total Requests</div>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="stat-info">
                            <div class="stat-value" id="usersStat">0</div>
                            <div class="stat-label">Total Users</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="hero">
                <div class="hero-content">
                    <span class="hero-badge">🔐 Secure System</span>
                    <h1 class="hero-title">Password Reset Request</h1>
                    <p>Submit request with your email. Email must be registered in our system. Live statistics update in real-time.</p>
                </div>
            </div>

            <div class="reset-grid">
                <!-- LEFT: Submit Request -->
                <div class="card">
                    <h2 class="card-title">
                        <i class="fas fa-paper-plane"></i>
                        Submit Request
                    </h2>
                    
                    <div class="form-group">
                        <label class="form-label">Your Email</label>
                        <input type="email" class="form-input" id="requestEmail" placeholder="Enter your email" autocomplete="off">
                        <div id="emailCheckResult" class="email-status"></div>
                        <div id="userInfo" class="user-info"></div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Reason for Reset</label>
                        <textarea class="form-input" id="requestReason" placeholder="Tell why you need password reset..."></textarea>
                    </div>
                    
                    <button class="btn-primary" onclick="submitRequest()" id="submitBtn">
                        Submit Request
                    </button>
                    
                    <!-- Secret Key will appear here after submission -->
                    <div id="submittedKeyDisplay" style="margin-top: 1rem;"></div>
                </div>
                
                <!-- RIGHT: Check Status -->
                <div class="card">
                    <h2 class="card-title">
                        <i class="fas fa-search"></i>
                        Check Status
                    </h2>
                    
                    <div class="form-group">
                        <label class="form-label">Your Email</label>
                        <input type="email" class="form-input" id="checkEmail" placeholder="Enter your email">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Secret Key</label>
                        <input type="text" class="form-input" id="secretKey" placeholder="Enter your 8-digit key">
                    </div>
                    
                    <button class="btn-primary" onclick="checkStatus()" id="checkStatusBtn">
                        <i class="fas fa-search"></i> Check Status
                    </button>
                    
                    <!-- Hidden monitoring controls -->
                    <div class="hidden-monitor">
                        <input type="checkbox" id="autoMonitor" checked>
                        <label>Auto-monitor in background</label>
                    </div>
                    
                    <!-- Results Container -->
                    <div id="statusResults" class="status-container" style="margin-top: 2rem;"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBsejOUBpCGAb44FJ1KkzaR05HBCK_oNbY",
            authDomain: "pdf-paid.firebaseapp.com",
            projectId: "pdf-paid",
            storageBucket: "pdf-paid.firebasestorage.app",
            messagingSenderId: "194238529471",
            appId: "1:194238529471:android:dad140450829341edd2b0a",
            databaseURL: "https://pdf-paid-default-rtdb.firebaseio.com"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        let emailExists = false;
        let currentUserData = null;
        let checkTimeout = null;
        
        // Background monitoring variables
        let backgroundInterval = null;
        let lastEmail = '';
        let lastSecretKey = '';
        let lastResultHash = '';
        let isMonitoring = false;
        let indicatorTimeout = null;
        
        // Live statistics
        let pendingCount = 0;
        let approvedCount = 0;
        let rejectedCount = 0;
        let totalUsers = 0;
        
        // DOM Elements for stats
        const pendingStat = document.getElementById('pendingStat');
        const approvedStat = document.getElementById('approvedStat');
        const processingStat = document.getElementById('processingStat');
        const usersStat = document.getElementById('usersStat');
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            document.getElementById('notificationMessage').textContent = message;
            notification.className = 'notification ' + (type === 'error' ? 'error' : '');
            notification.classList.add('show');
            setTimeout(() => notification.classList.remove('show'), 4000);
        }
        
        function showLoading(show) {
            if (loadingOverlay) {
                loadingOverlay.classList.toggle('show', show);
            }
        }
        
        function showAutoSaveIndicator() {
            const indicator = document.getElementById('autoSaveIndicator');
            indicator.style.display = 'flex';
            
            if (indicatorTimeout) {
                clearTimeout(indicatorTimeout);
            }
            
            indicatorTimeout = setTimeout(() => {
                indicator.style.display = 'none';
            }, 2000);
        }
        
        // Update live statistics
        function updateStatistics() {
            if (pendingStat) pendingStat.textContent = pendingCount;
            if (approvedStat) approvedStat.textContent = approvedCount;
            if (processingStat) processingStat.textContent = pendingCount + approvedCount + rejectedCount;
            if (usersStat) usersStat.textContent = totalUsers;
            
            // Add animation on update
            [pendingStat, approvedStat, processingStat].forEach(el => {
                if (el) {
                    el.style.transform = 'scale(1.1)';
                    setTimeout(() => {
                        el.style.transform = 'scale(1)';
                    }, 200);
                }
            });
        }
        
        // Load initial statistics
        async function loadStatistics() {
            try {
                // Get password requests count
                const requestsSnapshot = await database.ref('passwordRequests').once('value');
                const requests = requestsSnapshot.val();
                
                if (requests) {
                    pendingCount = Object.values(requests).filter(r => r.status === 'pending').length;
                    approvedCount = Object.values(requests).filter(r => r.status === 'approved').length;
                    rejectedCount = Object.values(requests).filter(r => r.status === 'rejected').length;
                }
                
                // Get users count
                const usersSnapshot = await database.ref('users').once('value');
                const users = usersSnapshot.val();
                totalUsers = users ? Object.keys(users).length : 0;
                
                updateStatistics();
                
            } catch (error) {
                console.error('Error loading statistics:', error);
            }
        }
        
        // Live listener for statistics
        function startLiveStatistics() {
            // Listen for password requests changes
            database.ref('passwordRequests').on('value', (snapshot) => {
                const requests = snapshot.val();
                
                if (requests) {
                    pendingCount = Object.values(requests).filter(r => r.status === 'pending').length;
                    approvedCount = Object.values(requests).filter(r => r.status === 'approved').length;
                    rejectedCount = Object.values(requests).filter(r => r.status === 'rejected').length;
                } else {
                    pendingCount = 0;
                    approvedCount = 0;
                    rejectedCount = 0;
                }
                
                updateStatistics();
            });
            
            // Listen for users changes
            database.ref('users').on('value', (snapshot) => {
                const users = snapshot.val();
                totalUsers = users ? Object.keys(users).length : 0;
                if (usersStat) usersStat.textContent = totalUsers;
            });
        }
        
        // Check if email exists in users node
        window.checkEmailExists = async function() {
            const email = document.getElementById('requestEmail').value.trim().toLowerCase();
            const emailResult = document.getElementById('emailCheckResult');
            const userInfo = document.getElementById('userInfo');
            const submitBtn = document.getElementById('submitBtn');
            
            if (checkTimeout) {
                clearTimeout(checkTimeout);
            }
            
            if (!email || !email.includes('@')) {
                emailResult.style.display = 'none';
                userInfo.style.display = 'none';
                emailExists = false;
                submitBtn.disabled = false;
                return;
            }
            
            emailResult.style.display = 'block';
            emailResult.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking email...';
            emailResult.className = 'email-status';
            userInfo.style.display = 'none';
            
            checkTimeout = setTimeout(async () => {
                try {
                    const snapshot = await database.ref('users').once('value');
                    const users = snapshot.val();
                    
                    let found = false;
                    let userData = null;
                    
                    if (users) {
                        Object.values(users).forEach(user => {
                            if (user.email && user.email.toLowerCase() === email) {
                                found = true;
                                userData = user;
                            }
                        });
                    }
                    
                    if (found) {
                        emailResult.className = 'email-status email-exists';
                        emailResult.innerHTML = '✅ Email found in registered users';
                        emailExists = true;
                        currentUserData = userData;
                        submitBtn.disabled = false;
                        
                        if (userData) {
                            let infoHtml = '<strong>User Details:</strong><br>';
                            if (userData.name) infoHtml += `👤 Name: ${userData.name}<br>`;
                            if (userData.phone) infoHtml += `📱 Phone: ${userData.phone}<br>`;
                            if (userData.dob) infoHtml += `🎂 DOB: ${userData.dob}<br>`;
                            userInfo.innerHTML = infoHtml;
                            userInfo.classList.add('show');
                        }
                    } else {
                        emailResult.className = 'email-status email-not-exists';
                        emailResult.innerHTML = '❌ Email not registered in system';
                        emailExists = false;
                        currentUserData = null;
                        submitBtn.disabled = false;
                        userInfo.style.display = 'none';
                    }
                } catch (error) {
                    emailResult.className = 'email-status email-not-exists';
                    emailResult.innerHTML = '❌ Error checking email';
                    emailExists = false;
                    submitBtn.disabled = false;
                }
            }, 500);
        };
        
        // Generate 8-digit secret key
        function generateSecretKey() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let key = '';
            for (let i = 0; i < 8; i++) {
                key += chars[Math.floor(Math.random() * chars.length)];
            }
            return key;
        }
        
        // Submit Request
        window.submitRequest = async function() {
            const email = document.getElementById('requestEmail').value.trim().toLowerCase();
            const reason = document.getElementById('requestReason').value.trim();
            
            if (!email || !email.includes('@')) {
                showNotification('Please enter a valid email', 'error');
                return;
            }
            
            if (!emailExists) {
                showNotification('This email is not registered in our system', 'error');
                return;
            }
            
            if (!reason || reason.length < 10) {
                showNotification('Please provide more details (min 10 characters)', 'error');
                return;
            }
            
            try {
                // Generate secret key
                const secretKey = generateSecretKey();
                
                // Prepare request data
                const requestData = {
                    email: email,
                    reason: reason,
                    secretKey: secretKey,
                    status: 'pending',
                    timestamp: Date.now()
                };
                
                // Only add optional fields if they exist
                if (currentUserData) {
                    if (currentUserData.name) requestData.userName = currentUserData.name;
                    if (currentUserData.phone) requestData.userPhone = currentUserData.phone;
                }
                
                // Save to Firebase
                const newRequestRef = database.ref('passwordRequests').push();
                await newRequestRef.set(requestData);
                
                // Clear form
                document.getElementById('requestEmail').value = '';
                document.getElementById('requestReason').value = '';
                document.getElementById('emailCheckResult').style.display = 'none';
                document.getElementById('userInfo').style.display = 'none';
                emailExists = false;
                currentUserData = null;
                
                // SHOW SECRET KEY
                document.getElementById('submittedKeyDisplay').innerHTML = `
                    <div class="key-display" onclick="copyKey('${secretKey}')">
                        <div>🔐 YOUR SECRET KEY</div>
                        <div style="font-size: 2rem; letter-spacing: 4px;">${secretKey}</div>
                        <small>Click to copy • Save this key to check status!</small>
                    </div>
                `;
                
                showNotification('✅ Request submitted! Save your secret key');
                
            } catch (error) {
                showNotification('Error submitting request: ' + error.message, 'error');
            }
        };
        
        // Main status check function
        async function performStatusCheck(email, secretKey) {
            try {
                const snapshot = await database.ref('passwordRequests').once('value');
                const requests = snapshot.val();
                
                if (!requests) {
                    return { found: false, requests: [] };
                }
                
                // Find matching request
                const matchingRequests = Object.entries(requests)
                    .filter(([id, req]) => 
                        req.email && req.email.toLowerCase() === email && 
                        req.secretKey === secretKey
                    )
                    .map(([id, req]) => ({ id, ...req }))
                    .sort((a, b) => b.timestamp - a.timestamp);
                
                return { 
                    found: matchingRequests.length > 0,
                    requests: matchingRequests
                };
                
            } catch (error) {
                console.error('Status check error:', error);
                return { found: false, requests: [], error: true };
            }
        }
        
        // Display results with REJECT and DELETE buttons
        function displayResults(result) {
            const resultsDiv = document.getElementById('statusResults');
            
            if (result.error) {
                resultsDiv.innerHTML = `
                    <div style="text-align: center; padding: 2rem; color: var(--danger);">
                        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                        <p>Error checking status</p>
                    </div>
                `;
                return;
            }
            
            if (!result.found || result.requests.length === 0) {
                resultsDiv.innerHTML = `
                    <div style="text-align: center; padding: 2rem; color: var(--gray);">
                        <i class="fas fa-inbox" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                        <p>No matching requests found</p>
                        <p style="font-size: 0.9rem; margin-top: 1rem;">Check your email and secret key</p>
                    </div>
                `;
                return;
            }
            
            // Show matching requests
            let html = '<h3 style="margin-bottom: 1rem;">Request Status:</h3>';
            
            result.requests.forEach(req => {
                const date = new Date(req.timestamp).toLocaleString();
                const statusClass = req.status || 'pending';
                
                html += `
                    <div class="message-card ${statusClass}" data-id="${req.id}">
                        <span class="message-status status-${statusClass}">
                            ${statusClass === 'approved' ? '✅ APPROVED' : statusClass === 'rejected' ? '❌ REJECTED' : '⏳ PENDING'}
                        </span>
                        <div style="margin: 0.5rem 0; padding: 0.5rem 0; border-bottom: 1px dashed var(--gray-soft);">
                            <strong>Reason:</strong> ${req.reason}
                        </div>
                        <div style="font-size: 0.8rem; color: var(--gray);">
                            <i class="far fa-clock"></i> Submitted: ${date}
                        </div>
                        ${statusClass === 'approved' && req.newPassword ? `
                            <div class="password-box" onclick="copyPassword('${req.newPassword}')">
                                <i class="fas fa-key"></i> New Password: ${req.newPassword}<br>
                                <small>Click anywhere to copy</small>
                            </div>
                        ` : ''}
                        
                        <!-- Action Buttons -->
                        <div class="request-actions">
                            ${statusClass === 'pending' ? `
                                <button class="action-btn reject-btn" onclick="rejectRequest('${req.id}', '${req.email}')">
                                    <i class="fas fa-times"></i> Reject
                                </button>
                            ` : ''}
                            <button class="action-btn delete-btn" onclick="deleteRequest('${req.id}')">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                `;
            });
            
            resultsDiv.innerHTML = html;
        }
        
        // ==========================================
        // REJECT REQUEST FUNCTION
        // ==========================================
        window.rejectRequest = async function(id, email) {
            if (!confirm(`Are you sure you want to reject the request from ${email}?`)) return;
            
            showLoading(true);
            
            try {
                await database.ref('passwordRequests/' + id).update({
                    status: 'rejected',
                    rejectedAt: Date.now()
                });
                
                showNotification(`✅ Request from ${email} has been rejected`, 'success');
                
                // Refresh the current status display
                const checkEmail = document.getElementById('checkEmail').value.trim().toLowerCase();
                const secretKey = document.getElementById('secretKey').value.trim();
                if (checkEmail && secretKey) {
                    const result = await performStatusCheck(checkEmail, secretKey);
                    displayResults(result);
                }
                
            } catch (error) {
                showNotification('Error rejecting request: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        };
        
        // ==========================================
        // DELETE REQUEST FUNCTION
        // ==========================================
        window.deleteRequest = async function(id) {
            if (!confirm('⚠️ WARNING: This will permanently delete this request. This action CANNOT be undone!')) return;
            
            // Double confirmation
            const secondConfirm = prompt('Type "DELETE" to confirm permanent deletion:');
            if (secondConfirm !== 'DELETE') {
                showNotification('Deletion cancelled', 'info');
                return;
            }
            
            showLoading(true);
            
            try {
                // Get request data first for notification
                const snapshot = await database.ref('passwordRequests/' + id).once('value');
                const requestData = snapshot.val();
                
                // Delete the request
                await database.ref('passwordRequests/' + id).remove();
                
                showNotification(`✅ Request${requestData?.email ? ' from ' + requestData.email : ''} has been deleted`, 'success');
                
                // Refresh the current status display
                const checkEmail = document.getElementById('checkEmail').value.trim().toLowerCase();
                const secretKey = document.getElementById('secretKey').value.trim();
                if (checkEmail && secretKey) {
                    const result = await performStatusCheck(checkEmail, secretKey);
                    displayResults(result);
                } else {
                    // Clear results if no email/key
                    document.getElementById('statusResults').innerHTML = '';
                }
                
            } catch (error) {
                showNotification('Error deleting request: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        };
        
        // Manual check status
        window.checkStatus = async function() {
            const email = document.getElementById('checkEmail').value.trim().toLowerCase();
            const secretKey = document.getElementById('secretKey').value.trim();
            
            if (!email || !email.includes('@')) {
                showNotification('Please enter email', 'error');
                return;
            }
            
            if (!secretKey) {
                showNotification('Please enter secret key', 'error');
                return;
            }
            
            // Save for background monitoring
            lastEmail = email;
            lastSecretKey = secretKey;
            
            // Show loading
            document.getElementById('statusResults').innerHTML = '<div style="text-align: center; padding: 2rem;"><i class="fas fa-spinner fa-spin"></i><p>Checking...</p></div>';
            
            // Perform check
            const result = await performStatusCheck(email, secretKey);
            displayResults(result);
            
            // Calculate hash for change detection
            lastResultHash = JSON.stringify(result.requests);
            
            // Start background monitoring if not already running
            startBackgroundMonitoring();
            
            showNotification('Status updated', 'success');
        };
        
        // Background monitoring function
        async function backgroundCheck() {
            if (!lastEmail || !lastSecretKey) return;
            
            try {
                const result = await performStatusCheck(lastEmail, lastSecretKey);
                const currentHash = JSON.stringify(result.requests);
                
                // If data has changed
                if (currentHash !== lastResultHash) {
                    lastResultHash = currentHash;
                    displayResults(result);
                    showAutoSaveIndicator();
                    
                    // Show notification for status changes
                    if (result.found && result.requests[0]?.status === 'approved') {
                        showNotification('🎉 Your request has been approved!', 'success');
                    } else if (result.found && result.requests[0]?.status === 'rejected') {
                        showNotification('❌ Your request has been rejected', 'info');
                    }
                }
            } catch (error) {
                console.error('Background check error:', error);
            }
        }
        
        // Start background monitoring
        function startBackgroundMonitoring() {
            if (!isMonitoring) {
                isMonitoring = true;
                backgroundInterval = setInterval(backgroundCheck, 2000);
            }
        }
        
        // Stop background monitoring
        function stopBackgroundMonitoring() {
            if (backgroundInterval) {
                clearInterval(backgroundInterval);
                backgroundInterval = null;
                isMonitoring = false;
            }
        }
        
        // Copy functions
        window.copyKey = function(key) {
            navigator.clipboard.writeText(key).then(() => {
                showNotification('✅ Secret key copied to clipboard!');
            }).catch(() => {
                showNotification('Failed to copy', 'error');
            });
        };
        
        window.copyPassword = function(password) {
            navigator.clipboard.writeText(password).then(() => {
                showNotification('✅ Password copied to clipboard!');
            }).catch(() => {
                showNotification('Failed to copy', 'error');
            });
        };
        
        // Event listeners
        document.getElementById('requestEmail').addEventListener('input', checkEmailExists);
        
        document.getElementById('requestEmail').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                submitRequest();
            }
        });
        
        document.getElementById('requestReason').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                submitRequest();
            }
        });
        
        document.getElementById('checkEmail').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('secretKey').focus();
            }
        });
        
        document.getElementById('secretKey').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkStatus();
            }
        });
        
        // Initialize on page load
        window.addEventListener('load', async () => {
            await loadStatistics();
            startLiveStatistics();
            
            // Check for saved values
            const email = document.getElementById('checkEmail').value;
            const key = document.getElementById('secretKey').value;
            
            if (email && key) {
                lastEmail = email.toLowerCase();
                lastSecretKey = key;
                startBackgroundMonitoring();
            }
        });
        
        // Clean up on page unload
        window.addEventListener('beforeunload', () => {
            stopBackgroundMonitoring();
        });
    </script>
</body>
</html>
