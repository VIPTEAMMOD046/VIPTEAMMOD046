<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF FORM EDITOR</title>

<!-- Redirect -->
<meta http-equiv="refresh" content="2.5; url=HomePage.html">
<script>
    setTimeout(() => {
        window.location.href = "HomePage.html";
    }, 2500);
</script>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --primary-light: #3b82f6;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    overflow: hidden;
}

/* Glass card */
.loader-card {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(15px);
    padding: 40px 50px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    color: #fff;
}

/* Logo */
.logo {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 25px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

/* Icon animation */
.logo i {
    font-size: 26px;
    color: #fff;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.2); opacity: 0.7; }
}

/* Spinner ring */
.spinner {
    width: 65px;
    height: 65px;
    border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.2);
    border-top: 4px solid #fff;
    margin: auto;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* Loading text */
.loading-text {
    margin-top: 20px;
    font-size: 15px;
    opacity: 0.9;
}

/* Animated dots */
.dots::after {
    content: "";
    animation: dots 1.5s steps(3, end) infinite;
}

@keyframes dots {
    0% { content: ""; }
    33% { content: "."; }
    66% { content: ".."; }
    100% { content: "..."; }
}
</style>
</head>

<body>

<div class="loader-card">
    <div class="logo">
        <i class="fas fa-file-pdf"></i>
        <span>PDF Form Editor Pro</span>
    </div>

    <div class="spinner"></div>

    <div class="loading-text">
        Preparing your editor<span class="dots"></span>
    </div>
</div>

</body>
</html>
