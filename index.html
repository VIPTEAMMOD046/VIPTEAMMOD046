<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PDF FORM EDITOR</title>

    <!-- Redirect after 2.5 seconds -->
    <meta http-equiv="refresh" content="2.5; url=HomePage.html">

    <script>
        setTimeout(function() {
            window.location.href = "HomePage.html";
        }, 2500);
    </script>

    <link rel="canonical" href="https://pdfformeditorpro.in/HomePage.html">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .loader-container {
            text-align: center;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top: 5px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            font-size: 16px;
            opacity: 0.9;
        }

        .dots::after {
            content: "";
            animation: dots 1.5s steps(3, end) infinite;
        }

        @keyframes dots {
            0% { content: ""; }
            33% { content: "."; }
            66% { content: ".."; }
            100% { content: "..."; }
        }
    </style>
</head>

<body>
    <div class="loader-container">
        <div class="logo">PDF Editor Pro</div>

        <div class="spinner"></div>

        <div class="loading-text">
            Loading<span class="dots"></span>
        </div>
    </div>
</body>
</html>
